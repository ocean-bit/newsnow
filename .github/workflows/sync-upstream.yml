name: Sync upstream

on:
  schedule:
    - cron: '0 6 * * *'   # 每天 UTC 6:00 自动同步
  workflow_dispatch:       # 也支持手动触发

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync with upstream
        run: |
          git remote add upstream https://github.com/ourongxing/newsnow.git
          git fetch upstream --tags
          git checkout main
          git merge upstream/main
          git push https://${{ secrets.PAT }}@github.com/${{ github.repository }}.git main
          git push https://${{ secrets.PAT }}@github.com/${{ github.repository }}.git --tags
