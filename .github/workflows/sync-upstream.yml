  name: Sync upstream and build Docker image

  on:
    schedule:
      - cron: '0 6 * * *'
    workflow_dispatch:

  permissions:
    contents: write
    packages: write

  jobs:
    sync:
      runs-on: ubuntu-latest
      outputs:
        has_update: ${{ steps.check.outputs.has_update }}
        tag: ${{ steps.gen-tag.outputs.tag }}
      steps:
        - uses: actions/checkout@v4
          with:
            fetch-depth: 0

        - name: Configure git
          run: |
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"

        - name: Fetch upstream
          run: |
            git remote add upstream https://github.com/ourongxing/newsnow.git
            git fetch upstream --tags

        - name: Check for updates
          id: check
          run: |
            git checkout main
            BEHIND=$(git rev-list --count main..upstream/main)
            if [ "$BEHIND" -gt 0 ]; then
              echo "has_update=true" >> $GITHUB_OUTPUT
            else
              echo "has_update=false" >> $GITHUB_OUTPUT
            fi

        - name: Sync with upstream
          if: steps.check.outputs.has_update == 'true'
          run: |
            git merge upstream/main
            git push https://${{ secrets.PAT }}@github.com/${{ github.repository }}.git main

        - name: Generate tag
          id: gen-tag
          if: steps.check.outputs.has_update == 'true'
          run: |
            echo "tag=v$(date +%Y%m%d)-myfork" >> $GITHUB_OUTPUT

        - name: Push tag
          if: steps.check.outputs.has_update == 'true'
          run: |
            git tag ${{ steps.gen-tag.outputs.tag }} main
            git push https://${{ secrets.PAT }}@github.com/${{ github.repository }}.git ${{ steps.gen-tag.outputs.tag }}

        - name: Set up QEMU
          if: steps.check.outputs.has_update == 'true'
          uses: docker/setup-qemu-action@v3

        - name: Set up Docker Buildx
          if: steps.check.outputs.has_update == 'true'
          uses: docker/setup-buildx-action@v3

        - name: Log in to ghcr.io
          if: steps.check.outputs.has_update == 'true'
          uses: docker/login-action@v3
          with:
            registry: ghcr.io
            username: ${{ github.actor }}
            password: ${{ secrets.GITHUB_TOKEN }}

        - name: Build and push
          if: steps.check.outputs.has_update == 'true'
          uses: docker/build-push-action@v5
          with:
            context: .
            file: ./Dockerfile
            platforms: linux/amd64,linux/arm64
            push: true
            tags: |
              ghcr.io/${{ github.repository }}:latest
              ghcr.io/${{ github.repository }}:${{ steps.gen-tag.outputs.tag }}
